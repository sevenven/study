<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>初识Vue</title>
		<script type="text/javascript" src="./vue-3.4.27.global.min.js"></script>
		<style>
			* {
				box-sizing: border-box;
			}
			:root {
				--bl-n250-c: #e8eaed;
				--bl-n900-c: #1f2329;
				--bl-n600-c: #646a73;
			}
		</style>
	</head>
	<body>
		<div id="app">
			<div class="app-box">
				<h2>{{ message }}</h2>
			</div>
		</div>
		<script type="text/javascript">
			Vue.createApp({
				data() {
					return {
						message: 'Hello Vue!'
					};
				},
				methods: {}
			}).mount('#app');
		</script>
	</body>
</html>
